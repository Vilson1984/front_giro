<div class="main">
  <div>
    <h2>Histórico de Viagens</h2>
    <input type="text" id="idUsuario" placeholder="ID do Usuário" [(ngModel)]="idUsuario" />
    <select id="idMotorista" placeholder="ID do Motorista" [(ngModel)]="idMotorista">
      <option value=""></option>
      <option value="1">Homer Simpson</option>
      <option value="2">Dominic Toretto</option>
      <option value="3">James Bond</option>
    </select>
    <button (click)="pesquisar(idUsuario, idMotorista)">pesquisar</button>
  </div>

  <div *ngFor="let viagem of historico" class="viagens">
    <div>data e hora da viagem: {{ viagem.date }}</div>
    <div>nome do motorista: {{ viagem.driver.name }}</div>
    <div>origem: {{ viagem.origin }}</div>
    <div>destino: {{ viagem.destination }}</div>
    <div>distância: {{ viagem.distance }}</div>
    <div>tempo: {{ viagem.duration }}</div>
    <div>valor: {{ viagem.value }}</div>
    <hr />
  </div>
</div>
