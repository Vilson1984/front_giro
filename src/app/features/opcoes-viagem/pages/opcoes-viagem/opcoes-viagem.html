<div class="opcoes-viagem"><h1>Opções de Viagem</h1>

<div *ngFor="let item of dados$ | async">
  <!-- {{ item | json }} -->
  <!-- {{item.driver | json}} -->
  
  <div>
      Nome: {{item.driver.name | json}}
      Rating: {{item.driver.rating | json}}
  </div>
  <div>
     Veículo: {{item.driver.vehicle | json}}
     Descrição: {{item.driver.description | json}}
  </div>
  <div>
      Preço/Km: {{item.driver.tax_per_km | json}}
      min/Km: {{item.driver.min_km | json}}
     Valor Viagem: {{item.price | json}}
  </div>
  <button>Selecionar</button>
